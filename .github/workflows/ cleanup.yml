name: 3일 지난 사진 자동 삭제

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 자정(UTC) 실행
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 3일 지난 사진 삭제
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;
            const now = Date.now();

            // photos/ 폴더 목록 조회
            let files;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path:  'photos',
              });
              files = Array.isArray(data) ? data : [];
            } catch (e) {
              console.log('photos 폴더 없음 — 삭제할 파일 없음');
              return;
            }

            for (const file of files) {
              if (!file.name.endsWith('.jpg')) continue;

              // 파일명에서 타임스탬프 추출: photo_1719000000000.jpg
              const match = file.name.match(/photo_(\d+)\.jpg/);
              if (!match) continue;

              const uploadedAt = parseInt(match[1], 10);
              if (now - uploadedAt >= THREE_DAYS_MS) {
                await github.rest.repos.deleteFile({
                  owner:   context.repo.owner,
                  repo:    context.repo.repo,
                  path:    file.path,
                  message: `자동 삭제: ${file.name}`,
                  sha:     file.sha,
                });
                console.log(`삭제됨: ${file.name}`);
              }
            }
